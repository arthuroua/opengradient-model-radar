<!DOCTYPE html>
<html>
<head>
<title>OpenGradient Model Radar</title>
<style>
body{
background:#0b0f19;
color:white;
font-family:Arial;
padding:40px;
}
h1{
color:#00e5ff;
}
.card{
background:#121826;
padding:20px;
margin:20px 0;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🚀 OpenGradient Model Radar</h1>

<div class="card">
<h2>🔥 Trending Models</h2>

<ul>
{% for model in trending %}
<li>{{model.name}}</li>
{% endfor %}
</ul>

</div>

<div class="card">

<h2>🆕 New Models</h2>

<ul>
{% for model in newest %}
<li>{{model.name}}</li>
{% endfor %}
</ul>

</div>

</body>
</html>
